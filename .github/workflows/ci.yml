name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Detect which parts of the codebase changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app: ${{ steps.filter.outputs.app }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'e2e/**'
              - 'e2e-electron/**'
              - 'e2e-tauri/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.ts'
              - 'playwright*.config.ts'
              - 'scripts/**'
              - 'electron/**'
              - 'index.html'
            rust:
              - 'src-tauri/**'

  unit-tests:
    name: Unit Tests & Type Check
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Skip — no app changes
        if: needs.changes.outputs.app != 'true'
        run: echo "No app changes detected, skipping tests."

      - name: Checkout code
        if: needs.changes.outputs.app == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.changes.outputs.app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        if: needs.changes.outputs.app == 'true'
        run: npm ci

      - name: Type check
        if: needs.changes.outputs.app == 'true'
        run: npx tsc --noEmit

      - name: Run unit tests
        if: needs.changes.outputs.app == 'true'
        run: npx vitest run

  e2e-web:
    name: Web E2E Tests (Playwright)
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Skip — no app changes
        if: needs.changes.outputs.app != 'true'
        run: echo "No app changes detected, skipping tests."

      - name: Checkout code
        if: needs.changes.outputs.app == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.changes.outputs.app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        if: needs.changes.outputs.app == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: needs.changes.outputs.app == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build
        if: needs.changes.outputs.app == 'true'
        run: npm run build

      - name: Run web E2E tests
        if: needs.changes.outputs.app == 'true'
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-web-results
          path: test-results/
          retention-days: 7

  e2e-electron:
    name: Electron E2E Tests
    needs: changes
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Skip — no app changes
        if: needs.changes.outputs.app != 'true'
        run: echo "No app changes detected, skipping tests."

      - name: Checkout code
        if: needs.changes.outputs.app == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.changes.outputs.app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        if: needs.changes.outputs.app == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: needs.changes.outputs.app == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        if: needs.changes.outputs.app == 'true'
        run: npm run build

      - name: Run Electron E2E tests
        if: needs.changes.outputs.app == 'true'
        run: npx playwright test --config=playwright-electron.config.ts

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-electron-results
          path: test-results/
          retention-days: 7

  e2e-tauri:
    name: Tauri E2E Tests (WebKit)
    needs: changes
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Skip — no app changes
        if: needs.changes.outputs.app != 'true'
        run: echo "No app changes detected, skipping tests."

      - name: Checkout code
        if: needs.changes.outputs.app == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.changes.outputs.app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        if: needs.changes.outputs.app == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: needs.changes.outputs.app == 'true'
        run: npx playwright install --with-deps webkit

      - name: Build frontend
        if: needs.changes.outputs.app == 'true'
        run: npm run build

      - name: Run Tauri E2E tests
        if: needs.changes.outputs.app == 'true'
        run: npx playwright test --config=playwright-tauri.config.ts

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-tauri-results
          path: test-results/
          retention-days: 7

  tauri-build:
    name: Tauri Binary Build & Rust Tests
    needs: changes
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Skip — no relevant changes
        if: needs.changes.outputs.app != 'true' && needs.changes.outputs.rust != 'true'
        run: echo "No app or Rust changes detected, skipping build."

      - name: Checkout code
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Rust toolchain
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        run: npm ci

      - name: Build frontend
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        run: npm run build

      - name: Run Rust unit tests
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        working-directory: src-tauri
        run: cargo test --lib --verbose

      - name: Build Tauri binary (debug)
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        working-directory: src-tauri
        run: cargo build --verbose

      - name: Verify binary exists
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        run: |
          BINARY="src-tauri/target/debug/notemac-plus-plus"
          if [ ! -f "$BINARY" ]; then
            echo "::error::Binary not found at $BINARY"
            ls -la src-tauri/target/debug/ | head -20
            exit 1
          fi
          echo "Binary found: $(ls -lh $BINARY | awk '{print $5}')"
          file "$BINARY"

      - name: Verify Tauri config consistency
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.rust == 'true'
        run: |
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAURI_VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")

          echo "Cargo.toml version:    $CARGO_VERSION"
          echo "tauri.conf.json version: $TAURI_VERSION"
          echo "package.json version:  $PKG_VERSION"

          if [ "$TAURI_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch: tauri.conf.json ($TAURI_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi

          echo "Frontend versions match ✓"
          echo "Cargo version: $CARGO_VERSION (Rust crate version, may differ from frontend)"
